  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a1a17;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Background ── */
    .bg { position: fixed; inset: 0; z-index: 0; }
    .bg svg { width: 100%; height: 100%; }

    /* ── Page ── */
    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 40px 24px 80px;
    }

    /* ── Logo ── */
    .logo { display: flex; align-items: center; justify-content: center; }
    .logo svg {
      height: clamp(80px, 10vw, 110px);
      width: auto;
      filter: drop-shadow(0 0 40px rgba(11, 241, 195, 0.25));
    }

    /* ── Language selector ── */
    .lang-selector {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .lang-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245, 244, 240, 0.07);
      border: 1px solid rgba(245, 244, 240, 0.14);
      border-radius: 100px;
      padding: 6px 12px;
      color: rgba(245, 244, 240, 0.5);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.03em;
    }

    .lang-btn:hover {
      background: rgba(245, 244, 240, 0.12);
      color: #F5F4F0;
      border-color: rgba(245, 244, 240, 0.25);
    }

    .lang-btn.active {
      background: rgba(11, 241, 195, 0.1);
      border-color: rgba(11, 241, 195, 0.35);
      color: #0BF1C3;
    }

    .lang-flag { display: flex; width: 18px; height: 18px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
    .lang-flag svg { width: 100%; height: 100%; }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(245, 244, 240, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(245, 244, 240, 0.18);
      border-radius: 100px;
      padding: 9px 20px 9px 16px;
      color: #F5F4F0;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .badge-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 1.5px solid rgba(245, 244, 240, 0.5);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .badge-dot::after {
      content: '';
      width: 7px; height: 7px;
      background: #F5F4F0;
      border-radius: 50%;
      animation: blink 2.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ── CTA Card ── */
    .cta-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
      background: rgba(13, 31, 27, 0.55);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(11, 241, 195, 0.14);
      border-radius: 100px;
      padding: 28px 28px 28px 44px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 8px 60px rgba(0, 0, 0, 0.25);
    }

    .cta-text {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: clamp(13px, 1.8vw, 15px);
      font-weight: 400;
      color: rgba(245, 244, 240, 0.82);
      line-height: 1.6;
      flex: 1;
    }

    .cta-text strong { font-weight: 600; color: #F5F4F0; }

    /* ── CTA Button ── */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #0BF1C3;
      color: #080808;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 17px;
      font-weight: 700;
      white-space: nowrap;
      padding: 15px 25px;
      border-radius: 15px;
      border: unset;
      text-decoration: none;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      overflow: hidden;
      -webkit-box-shadow: 4px 8px 19px -3px rgba(0,0,0,0.27);
      box-shadow: 4px 8px 19px -3px rgba(0,0,0,0.27);
      transition: all 250ms;
    }

    .cta-btn::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      height: 100%; width: 0;
      border-radius: 15px;
      background-color: #0D1F1B;
      z-index: -1;
      -webkit-box-shadow: 4px 8px 19px -3px rgba(0,0,0,0.27);
      box-shadow: 4px 8px 19px -3px rgba(0,0,0,0.27);
      transition: all 250ms;
    }

    .cta-btn:hover { color: #0BF1C3; }
    .cta-btn:hover::before { width: 100%; }
    .cta-btn svg { flex-shrink: 0; transition: fill 250ms; }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      text-align: center;
      padding: 20px 24px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      color: rgba(245, 244, 240, 0.45);
      z-index: 2;
    }

    .footer strong { font-weight: 600; color: rgba(245, 244, 240, 0.65); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .cta-card {
        flex-direction: column;
        align-items: flex-start;
        border-radius: 28px;
        padding: 28px;
        gap: 24px;
      }
      .cta-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
